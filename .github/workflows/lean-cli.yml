name: lean-cli

on:
  push:
    paths:
      - "experiments/lean-ast/lean-cli/**"
      - "experiments/lean-ast/rewrite-poc/**"
      - "experiments/lean-ast/hooks/**"
      - "experiments/lean-ast/concurrency-stress/**"
      - "experiments/lean-ast/lake-concurrency/**"
      - "lean-formalization/Manifest/Models/Instances/LeanAstCli/**"
      - ".github/workflows/lean-cli.yml"
  pull_request:
    paths:
      - "experiments/lean-ast/**"
      - "lean-formalization/Manifest/Models/Instances/LeanAstCli/**"
      - ".github/workflows/lean-cli.yml"
  workflow_dispatch:
    inputs:
      run_lake_concurrency:
        description: "Run the destructive Lake concurrency stress test (Impl-D)"
        required: false
        default: "false"

# Impl-F #670 (Parent #665). Continuous verification of the lean-cli
# package, byte-preserving rewrite harness, and hook routing tests.
# The perf-regression job enforces Impl-F Gate (d): p95 wall-clock of
# the CLI's parse subcommand must stay below 130 ms (Sub-D baseline
# 103 ms + 25 % margin, per Impl-F #670 Verifier F9 fix).

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean 4 toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          bash elan-init.sh -y --default-toolchain leanprover/lean4:v4.29.0
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache lake build dirs
        uses: actions/cache@v4
        with:
          path: |
            experiments/lean-ast/lean-cli/.lake
            experiments/lean-ast/rewrite-poc/.lake
          key: lake-${{ matrix.os }}-4.29.0-${{ hashFiles('experiments/lean-ast/**/lakefile.lean', 'experiments/lean-ast/**/lean-toolchain') }}
          restore-keys: |
            lake-${{ matrix.os }}-4.29.0-

      - name: Build lean-cli
        working-directory: experiments/lean-ast/lean-cli
        run: lake build

      - name: Build rewrite-poc
        working-directory: experiments/lean-ast/rewrite-poc
        run: lake build rewrite-poc elab-smoketest

      - name: lean-cli integration tests (7 tests)
        working-directory: experiments/lean-ast/lean-cli
        run: bash tests/run-tests.sh

      - name: rewrite-poc byte-preserving tests (14 patterns)
        working-directory: experiments/lean-ast/rewrite-poc
        run: bash run-tests.sh

      - name: Hook routing unit tests (4 tests)
        run: bash experiments/lean-ast/hooks/tests/run-tests.sh

  perf-regression:
    runs-on: macos-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          bash elan-init.sh -y --default-toolchain leanprover/lean4:v4.29.0
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache lake build
        uses: actions/cache@v4
        with:
          path: experiments/lean-ast/lean-cli/.lake
          key: lake-perf-${{ hashFiles('experiments/lean-ast/lean-cli/**/lakefile.lean', 'experiments/lean-ast/lean-cli/**/lean-toolchain') }}

      - name: Build lean-cli (warm)
        working-directory: experiments/lean-ast/lean-cli
        run: lake build

      - name: Warm-up (discard first invocation)
        working-directory: experiments/lean-ast/lean-cli
        run: .lake/build/bin/lean-cli parse tests/fixtures/basic.lean >/dev/null || echo "warm-up complete"

      - name: Measure 10 warm invocations and check Gate
        working-directory: experiments/lean-ast/lean-cli
        run: |
          python3 - <<'PY'
          # Gate (Impl-F Issue #670 with Verifier F9): p95 wall-clock <= 130 ms.
          # Sub-D Profile A baseline 103 ms + 25 % margin.
          # We measure 10 warm runs, compute p95, and fail if p95 > 130.
          import subprocess, time, json, statistics, sys, pathlib
          cli = pathlib.Path(".lake/build/bin/lean-cli").resolve()
          fixture = pathlib.Path("tests/fixtures/basic.lean").resolve()
          assert cli.exists(), f"lean-cli binary missing at {cli}"
          ns_samples = []
          for _ in range(10):
              t0 = time.perf_counter_ns()
              r = subprocess.run([str(cli), "parse", str(fixture)],
                                 stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
              t1 = time.perf_counter_ns()
              if r.returncode != 0:
                  sys.stderr.write(r.stderr.decode(errors="replace"))
                  sys.exit(1)
              ns_samples.append(t1 - t0)
          ns_samples.sort()
          ms = [ns / 1_000_000 for ns in ns_samples]
          p50 = statistics.median(ms)
          p95 = ms[int(round(10 * 0.95 - 1))]
          print(json.dumps({
              "samples_ms": ms,
              "p50_ms": round(p50, 1),
              "p95_ms": round(p95, 1),
              "gate_ms": 130,
          }, indent=2))
          if p95 > 130:
              sys.exit(f"PERF REGRESSION: p95={p95:.1f}ms > 130ms Gate")
          PY

  lake-concurrency:
    # Impl-D stress test. Destructive (.lake/build wipe) → opt-in only.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_lake_concurrency == 'true'
    runs-on: macos-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          bash elan-init.sh -y --default-toolchain leanprover/lean4:v4.29.0
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Build lean-cli (required for the stress harness)
        working-directory: experiments/lean-ast/lean-cli
        run: lake build
      - name: Run Lake concurrency stress
        run: bash experiments/lean-ast/lake-concurrency/stress.sh
      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lake-concurrency-summary
          path: experiments/lean-ast/lake-concurrency/log/summary.json
